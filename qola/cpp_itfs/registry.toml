# QoLA cpp_itfs source registry.
#
# Maps optCompilerConfig module names to the source replacements needed
# when building in cpp_itfs (torch-free) mode.
#
# For each module:
#   drop_srcs    - basenames of pybind sources to remove from the
#                  optCompilerConfig srcs list.
#   add_srcs     - QoLA cpp_itfs source files to add (relative to QoLA root).
#   add_includes - extra include directories (relative to QoLA root).
#                  torch_stubs MUST come first so stub headers shadow real torch.
#
# AITER's dispatch .cu files and codegen output are kept in the source list
# and compiled against QoLA's stub torch headers.  Only the pybind entry
# points are dropped.

[module_gemm_a4w4_asm]
drop_srcs    = ["pybind/gemm_a4w4_asm_pybind.cu"]
add_srcs     = ["qola/cpp_itfs/qola_gemm_a4w4_asm.cu"]
add_includes = ["qola/cpp_itfs/torch_stubs", "qola/cpp_itfs"]

[module_gemm_a4w4_blockscale]
drop_srcs    = ["pybind/gemm_a4w4_blockscale_pybind.cu"]
add_srcs     = ["qola/cpp_itfs/qola_gemm_a4w4_blockscale.cu"]
add_includes = ["qola/cpp_itfs/torch_stubs", "qola/cpp_itfs"]

# MHA modules are already torch-free (torch_exclude=true, is_python_module=false
# in optCompilerConfig).  No pybind sources to drop, no torch_stubs needed.
# The wrapper only adds namespace guarding.

[libmha_fwd]
drop_srcs    = []
add_srcs     = ["qola/cpp_itfs/qola_mha_fwd.cu"]
add_includes = ["qola/cpp_itfs"]

[libmha_bwd]
drop_srcs    = []
add_srcs     = ["qola/cpp_itfs/qola_mha_bwd.cu"]
add_includes = ["qola/cpp_itfs"]
