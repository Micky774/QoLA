# QoLA cpp_itfs source registry.
#
# Maps optCompilerConfig module names to the source replacements needed
# when building in cpp_itfs (torch-free) mode.
#
# For each module:
#   drop_srcs    - basenames of pybind sources to remove from the
#                  optCompilerConfig srcs list.
#   add_srcs     - QoLA cpp_itfs source files to add (relative to QoLA root).
#   add_includes - extra include directories (relative to QoLA root).

[module_gemm_a4w4_asm]
drop_srcs    = ["pybind/gemm_a4w4_asm_pybind.cu", "py_itfs_cu/asm_gemm_a4w4.cu"]
add_srcs     = ["qola/cpp_itfs/gemm_a4w4_asm.cu"]
add_includes = ["qola/cpp_itfs"]

[module_gemm_a4w4_blockscale]
drop_srcs    = [
    "pybind/gemm_a4w4_blockscale_pybind.cu",
    "ck_gemm_a4w4_blockscale/gemm_a4w4_blockscale.cu",
    "py_itfs_cu/gemm_common.cu",
]
add_srcs     = ["qola/cpp_itfs/gemm_a4w4_blockscale.cu"]
add_includes = ["qola/cpp_itfs"]
# blob_gen_cmd is resolved by _apply_cpp_itfs():
#   {QOLA_ROOT}  → absolute path to QoLA root
#   {AITER_CONFIGS.AITER_CONFIG_GEMM_A4W4_FILE} → eval'd in AITER namespace
#   {{}}  → literal {} for build_module's blob_dir format()
blob_gen_cmd = "{QOLA_ROOT}/qola/cpp_itfs/gen_blockscale_instances.py --working_path {{}} --tune_file {AITER_CONFIGS.AITER_CONFIG_GEMM_A4W4_FILE}"
